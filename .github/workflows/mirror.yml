name: Mirror to Codeberg (Keep README)

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Add Codeberg remote
        run: |
          git remote add codeberg https://${{ secrets.CODEBERG_USERNAME }}:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/Kdroidwin/uB-filter-by-kdroidwin.git

      - name: Push to Codeberg (excluding README)
        run: |
          if [ -f README.md ]; then mv README.md README.md.bak; fi
          git push codeberg main --tags
          if [ -f README.md.bak ]; then mv README.md.bak README.md; fi
